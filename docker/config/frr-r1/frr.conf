! FRR Configuration for Router R1
! This is a minimal starting config. The agent will configure BGP peering
! by connecting to this router's CLI via Boundary TCP target.
frr defaults traditional
hostname r1
log syslog
service integrated-vtysh-config
!
interface lo
 ip address 10.1.1.1/32
!
interface eth0
 ip address 10.100.1.1/24
!
! BGP will be configured by the agent via Boundary
! router bgp 65001
!  neighbor 10.100.2.1 remote-as 65002
!  neighbor 10.100.3.1 remote-as 65003
!  network 10.1.1.1/32
!
line vty
!
